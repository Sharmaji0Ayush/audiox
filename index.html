<!doctype html>
<html>
    <head>
        <title>Social Jukebox Final</title>
        <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" />

        <style>
            /* BASE THEME */
            body { background-color: #050505; color: white; font-family: "Segoe UI", sans-serif; margin: 0; overflow-x: hidden; }
            * { box-sizing: border-box; }

            /* AMBIENT BACKGROUND */
            #ambient-light {
                position: fixed; top: 50%; left: 50%; width: 120vw; height: 120vw;
                background: conic-gradient(from 180deg at 50% 50%, #ff0055 0deg, #000000 120deg, #00aaff 240deg, #ff0055 360deg);
                filter: blur(90px) opacity(0.25); z-index: -1; transform: translate(-50%, -50%);
                animation: rotateAmbient 25s linear infinite;
            }
            @keyframes rotateAmbient {
                0% { transform: translate(-50%, -50%) rotate(0deg); }
                100% { transform: translate(-50%, -50%) rotate(360deg); }
            }

            /* LOGIN OVERLAY */
            #login-overlay {
                position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 2000;
                display: flex; flex-direction: column; justify-content: center; align-items: center; gap: 15px;
            }
            #login-overlay input { width: 70%; max-width: 300px; text-align: center; }

            /* PAGES */
            .page { display: none; padding: 20px; padding-bottom: 120px; min-height: 100vh; position: relative; }
            .page.active { display: flex; flex-direction: column; }

            /* MODE SWITCH */
            .mode-switch {
                display: flex; background: rgba(255, 255, 255, 0.1); padding: 5px; border-radius: 20px; margin: 0 auto 15px auto; width: fit-content; backdrop-filter: blur(5px);
            }
            .mode-btn { padding: 5px 15px; border-radius: 15px; border: none; background: none; color: #aaa; font-size: 12px; font-weight: bold; cursor: pointer; transition: 0.3s; }
            .mode-btn.active { background: #ff0055; color: white; box-shadow: 0 2px 10px rgba(255, 0, 85, 0.4); }

            /* VISUALS */
            #video-container { width: 100%; padding-bottom: 56.25%; position: relative; background: #000; border-radius: 15px; overflow: hidden; margin-bottom: 10px; box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5); display: none; }
            #player { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }
            #album-art-container { width: 70vw; height: 70vw; max-width: 300px; max-height: 300px; margin: 10px auto 30px auto; position: relative; }
            #album-art {
                width: 100%; height: 100%; border-radius: 50%; background-image: url("https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExYjRkODRkODRkODRkODRkODRkODRkODRkODRkODRkODRkODRkODRkODRkOCZlcD12MV9pbnRlcm5hbF9naWZzX2dpZklkJmN0PWc/3o7abAHdYvZdBNnGZq/giphy.gif");
                background-size: 100% 100%; background-position: center; border: 6px solid #111;
                box-shadow: 0 0 15px #ff0055, 0 0 30px rgba(0, 170, 255, 0.6), inset 0 0 20px rgba(0, 0, 0, 0.8);
                animation: spin 8s linear infinite, pulseGlow 2s ease-in-out infinite alternate; animation-play-state: paused;
            }
            @keyframes spin { 100% { transform: rotate(360deg); } }
            @keyframes pulseGlow { 0% { scale: 1; filter: brightness(1); } 100% { scale: 1.02; filter: brightness(1.15); } }

            /* INFO & SLIDERS */
            #song-info { text-align: center; margin-bottom: 15px; text-shadow: 0 2px 5px rgba(0, 0, 0, 0.5); }
            #current-title { font-size: 20px; font-weight: bold; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
            #room-tag { font-size: 12px; color: #ff0055; margin-bottom: 5px; text-transform: uppercase; font-weight: bold; text-align: center; letter-spacing: 1px; }

            input[type="range"] { -webkit-appearance: none; width: 100%; height: 3px; background: rgba(255, 255, 255, 0.2); border-radius: 2px; outline: none; border: none; cursor: pointer; }
            input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; width: 12px; height: 12px; background: #ff0055; border-radius: 50%; cursor: pointer; box-shadow: 0 0 5px #ff0055; }

            .timeline-container { width: 100%; display: flex; align-items: center; gap: 10px; margin-bottom: 15px; }
            .time-label { font-size: 11px; color: #aaa; width: 35px; text-align: center; font-family: monospace; }
            .volume-container { width: 70%; margin: 15px auto; display: flex; align-items: center; gap: 15px; }
            .volume-icon { color: #aaa; font-size: 14px; }

            /* CONTROLS */
            .controls { display: flex; justify-content: center; gap: 30px; align-items: center; margin-top: 5px; }
            .ctrl-btn { background: none; border: none; color: white; cursor: pointer; filter: drop-shadow(0 2px 5px rgba(0, 0, 0, 0.3)); }
            .btn-main { width: 70px; height: 70px; background: linear-gradient(135deg, #ff0055, #ff3377); border-radius: 50%; font-size: 28px; box-shadow: 0 5px 20px rgba(255, 0, 85, 0.4); }
            .btn-sec { font-size: 26px; color: #ccc; }

            /* NAV & INPUTS */
            .nav { display: flex; justify-content: space-around; background: rgba(15, 15, 15, 0.9); backdrop-filter: blur(15px); padding: 15px; padding-bottom: 25px; position: fixed; bottom: 0; width: 100%; border-top: 1px solid #333; z-index: 1000; }
            .nav button { background: none; border: none; color: #555; font-size: 22px; width: 100%; transition: 0.3s; cursor: pointer; }
            .nav button.active { color: #ff0055; transform: translateY(-3px); filter: drop-shadow(0 0 5px #ff0055); }

            input[type="text"] { width: 100%; padding: 15px; background: #222; border: 1px solid #333; color: white; border-radius: 12px; font-size: 16px; outline: none; }
            .btn { width: 100%; padding: 12px; background: #ff0055; color: white; border: none; border-radius: 12px; font-weight: bold; font-size: 16px; margin-top: 10px; cursor: pointer; }

            .result-item { display: flex; align-items: center; background: #1a1a1a; margin-top: 10px; padding: 10px; border-radius: 12px; }
            .result-item img { width: 50px; height: 50px; border-radius: 8px; margin-right: 15px; object-fit: cover; }
            .result-info { flex-grow: 1; overflow: hidden; }
            .add-btn { background: #ff0055; border: none; color: white; padding: 5px 10px; border-radius: 5px; cursor: pointer; }
            #chat-box { flex-grow: 1; overflow-y: scroll; background: #111; padding: 10px; border-radius: 12px; height: 50vh; }
            .msg { margin-bottom: 8px; font-size: 14px; }
        </style>
    </head>
    <body>
        <div id="ambient-light"></div>

        <div id="login-overlay">
            <h2 style="color: #ff0055; text-shadow: 0 0 10px rgba(255, 0, 85, 0.5)">Join a Room</h2>
            <input type="text" id="usernameInput" placeholder="Your Name" />
            <input type="text" id="roomInput" placeholder="Room Code (e.g. PARTY)" style="margin-top: 10px" />
            <button class="btn" style="width: 70%; box-shadow: 0 5px 15px rgba(255, 0, 85, 0.3)" onclick="joinRoom()">Join</button>
        </div>

        <div id="page-player" class="page active">
            <div id="room-tag">ROOM: <span id="room-name-display">...</span></div>
            <div class="mode-switch">
                <button class="mode-btn active" onclick="setMode('audio')">Audio</button>
                <button class="mode-btn" onclick="setMode('video')">Video</button>
            </div>
            <div id="video-container"><div id="player"></div></div>
            <div id="album-art-container"><div id="album-art"></div></div>
            <div id="song-info">
                <div id="current-title">Loading...</div>
                <div style="font-size: 12px; color: #ccc">Added by: <span id="added-by">System</span></div>
            </div>
            <div class="timeline-container">
                <span class="time-label" id="time-current">0:00</span>
                <input type="range" id="seek-bar" value="0" min="0" max="100" onchange="seekSong()" oninput="isDragging=true" />
                <span class="time-label" id="time-total">0:00</span>
            </div>
            <div class="controls">
                <button class="ctrl-btn btn-sec" onclick="triggerPrevTrack()"><i class="fa fa-backward"></i></button>
                <button class="ctrl-btn btn-main" onclick="togglePlay()"><i id="play-icon" class="fa fa-play"></i></button>
                <button class="ctrl-btn btn-sec" onclick="triggerSkipTrack()"><i class="fa fa-forward"></i></button>
            </div>
            <div class="volume-container">
                <i class="fa fa-volume-down volume-icon"></i>
                <input type="range" id="volume-slider" min="0" max="100" value="100" oninput="changeVolume()" />
                <i class="fa fa-volume-up volume-icon" style="color: #fff"></i>
            </div>
        </div>

        <div id="page-search" class="page">
            <h2>Track URL Loader</h2>
            <input type="text" id="streamUrlInput" placeholder="Paste direct YouTube Video ID (e.g., dQw4w9WgXcQ)" />
            <button class="btn" onclick="loadDirectId()">Load Track</button>
        </div>

        <div id="page-queue" class="page">
            <h2>Queue</h2>
            <div id="queue-list"><p style='text-align:center;color:#666'>Queue Empty</p></div>
        </div>

        <div id="page-chat" class="page">
            <h2>Chat</h2>
            <div id="chat-box"></div>
            <input type="text" id="chatInput" placeholder="Message..." />
            <button class="btn" onclick="sendChat()">Send</button>
        </div>

        <div class="nav">
            <button onclick="switchTab('player', this)" class="active"><i class="fa fa-music"></i></button>
            <button onclick="switchTab('search', this)"><i class="fa fa-search"></i></button>
            <button onclick="switchTab('queue', this)"><i class="fa fa-list"></i></button>
            <button onclick="switchTab('chat', this)"><i class="fa fa-comment"></i></button>
        </div>

        <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
        <script src="https://www.youtube.com/iframe_api"></script>
        
        <script>
            // --- CONFIGURATION ---
            const SUPABASE_URL = "https://dizwcmqkywfcranpvxhk.supabase.co";
            const SUPABASE_ANON_KEY= "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRpendjbXFreXdmY3JhbnB2eGhrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIzMTczNDgsImV4cCI6MjA5Nzg5MzM0OH0.ZOiSiNv7KjhlfFOcCPfmksnEkyIfFSkVTbF1sVW-mdEe";
            const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

            var player;
            var myName = "";
            var myRoom = "";
            var isDragging = false;
            var roomChannel;
            
            // Central memory state structure representing your old room configuration object
            var localState = {
                currentSong: { videoId: "", title: "No Track Loaded", addedBy: "System" },
                queue: [],
                isPlaying: false
            };

            // --- KEYBOARD LISTENERS ---
            document.addEventListener("keydown", (e) => {
                const active = document.activeElement;
                const isInput = active.tagName === "INPUT";
                if (e.code === "Space" && !isInput) {
                    e.preventDefault();
                    togglePlay();
                }
                if (e.code === "Enter") {
                    if (active.id === "chatInput") sendChat();
                    else if (document.getElementById("login-overlay").style.display !== "none") joinRoom();
                }
            });

            function setMode(mode) {
                document.getElementById("video-container").style.display = mode === "video" ? "block" : "none";
                document.getElementById("album-art-container").style.display = mode === "audio" ? "block" : "none";
                document.querySelectorAll(".mode-btn").forEach((b, i) => b.classList.toggle("active", (mode === 'video' && i === 1) || (mode === 'audio' && i === 0)));
            }

            // --- REALTIME SYNC HANDSHAKE ENGINE ---
            function joinRoom() {
                var u = document.getElementById("usernameInput").value.trim();
                var r = document.getElementById("roomInput").value.trim().toUpperCase();
                if (u && r) {
                    myName = u;
                    myRoom = r;
                    document.getElementById("login-overlay").style.display = "none";
                    document.getElementById("room-name-display").innerText = r;

                    // Initialize the Broadcast Channel
                    roomChannel = supabaseClient.channel(`room_${r}`, {
                        config: { broadcast: { self: true } }
                    });

                    roomChannel
                        .on('broadcast', { event: 'sync' }, (payload) => {
                            handleIncomingSync(payload.payload);
                        })
                        .on('broadcast', { event: 'chat' }, (payload) => {
                            appendChatMessage(payload.payload);
                        })
                        .subscribe((status) => {
                            if (status === 'SUBSCRIBED') {
                                broadcastAction('request_state', {});
                                broadcastAction('chat', { user: "System", text: `${u} joined!` });
                            }
                        });
                } else {
                    alert("Please enter Name and Room Code!");
                }
            }

            function broadcastAction(event, payload) {
                if (roomChannel) {
                    roomChannel.send({ type: 'broadcast', event: event, payload: payload });
                }
            }

            function handleIncomingSync(data) {
                if (data.action === "state_update" || data.action === "initial_state") {
                    localState = data.state;
                    updateUIDisplay(localState.currentSong);
                    updateQueueUI(localState.queue);
                    
                    if (localState.currentSong.videoId && player && player.loadVideoById) {
                        if (player.getVideoData().video_id !== localState.currentSong.videoId) {
                            player.loadVideoById(localState.currentSong.videoId, data.time || 0);
                        }
                    }
                    
                    if (localState.isPlaying) {
                        if (data.time && Math.abs(player.getCurrentTime() - data.time) > 3) player.seekTo(data.time);
                        player.playVideo();
                        updatePlayIcon(true);
                    } else {
                        player.pauseVideo();
                        updatePlayIcon(false);
                    }
                }
                else if (data.action === "request_state" && localState.currentSong.videoId) {
                    // Existing users answer new users with current state configuration
                    broadcastAction('sync', {
                        action: 'initial_state',
                        state: localState,
                        time: player.getCurrentTime()
                    });
                }
            }

            function onYouTubeIframeAPIReady() {
                player = new YT.Player("player", {
                    height: "100%", width: "100%", videoId: "",
                    playerVars: { autoplay: 1, controls: 0, disablekb: 1, playsinline: 1 },
                    events: { onStateChange: (e) => { if (e.data == YT.PlayerState.ENDED) triggerSkipTrack(); } }
                });
            }

            function changeVolume() {
                var vol = document.getElementById("volume-slider").value;
                if (player && player.setVolume) player.setVolume(vol);
            }

            function loadDirectId() {
                var id = document.getElementById("streamUrlInput").value.trim();
                if (id) {
                    localState.currentSong = { videoId: id, title: "Streaming Video: " + id, addedBy: myName };
                    localState.isPlaying = true;
                    broadcastAction('sync', { action: 'state_update', state: localState, time: 0 });
                    switchTab('player', document.querySelectorAll(".nav button")[0]);
                }
            }

            function togglePlay() {
                localState.isPlaying = !localState.isPlaying;
                broadcastAction('sync', {
                    action: 'state_update',
                    state: localState,
                    time: player.getCurrentTime()
                });
            }

            function seekSong() {
                var slider = document.getElementById("seek-bar");
                broadcastAction('sync', {
                    action: 'state_update',
                    state: localState,
                    time: parseFloat(slider.value)
                });
                isDragging = false;
            }

            function triggerSkipTrack() {
                if (localState.queue.length > 0) {
                    var nextTrack = localState.queue.shift();
                    localState.currentSong = { videoId: nextTrack.videoId, title: nextTrack.title, addedBy: nextTrack.user };
                    localState.isPlaying = true;
                    broadcastAction('sync', { action: 'state_update', state: localState, time: 0 });
                } else {
                    alert("Queue Empty!");
                }
            }

            function triggerPrevTrack() {
                broadcastAction('sync', { action: 'state_update', state: localState, time: 0 });
            }

            function req(id, title, thumb) {
                var trackObj = { videoId: id, title: title, user: myName, thumbnail: thumb };
                if (!localState.isPlaying && localState.queue.length === 0) {
                    localState.currentSong = { videoId: id, title: title, addedBy: myName };
                    localState.isPlaying = true;
                    broadcastAction('sync', { action: 'state_update', state: localState, time: 0 });
                } else {
                    localState.queue.push(trackObj);
                    broadcastAction('sync', { action: 'state_update', state: localState, time: player.getCurrentTime() });
                    broadcastAction('chat', { user: "System", text: `${myName} added "${title}"` });
                }
                alert("Added!");
                switchTab("queue", document.querySelectorAll(".nav button")[2]);
            }

            // --- DISPLAY LOGIC MANAGERS ---
            function updateUIDisplay(song) {
                document.getElementById("current-title").innerText = song.title || "No Track Loaded";
                document.getElementById("added-by").innerText = song.addedBy || "System";
                if (song.thumbnail) {
                    document.getElementById("album-art").style.backgroundImage = `url('${song.thumbnail}')`;
                }
            }

            function updateQueueUI(q) {
                const div = document.getElementById("queue-list");
                div.innerHTML = q.length ? "" : "<p style='text-align:center;color:#666'>Queue Empty</p>";
                q.forEach((i) => {
                    div.innerHTML += `<div class="result-item" style="border-left:3px solid #ff0055"><div class="result-info"><div>${i.title}</div><div style="font-size:11px;color:#ff0055">${i.user}</div></div></div>`;
                });
            }

            function sendChat() {
                const i = document.getElementById("chatInput");
                if (i.value) {
                    broadcastAction('chat', { user: myName, text: i.value });
                    i.value = "";
                }
            }

            function appendChatMessage(msg) {
                const b = document.getElementById("chat-box");
                b.innerHTML += `<div class="msg"><b>${msg.user}:</b> ${msg.text}</div>`;
                b.scrollTop = b.scrollHeight;
            }

            setInterval(() => {
                if (player && player.getCurrentTime && !isDragging) {
                    var current = player.getCurrentTime();
                    var duration = player.getDuration();
                    if (duration > 0) {
                        document.getElementById("seek-bar").max = duration;
                        document.getElementById("seek-bar").value = current;
                        document.getElementById("time-current").innerText = formatTime(current);
                        document.getElementById("time-total").innerText = formatTime(duration);
                    }
                }
            }, 1000);

            function formatTime(s) {
                var m = Math.floor(s / 60); var sec = Math.floor(s % 60);
                return m + ":" + (sec < 10 ? "0" : "") + sec;
            }

            function updatePlayIcon(isPlaying) {
                const icon = document.getElementById("play-icon");
                const art = document.getElementById("album-art");
                icon.className = isPlaying ? "fa fa-pause" : "fa fa-play";
                art.style.animationPlayState = isPlaying ? "running" : "paused";
            }

            function switchTab(t, btn) {
                document.querySelectorAll(".page").forEach((p) => p.classList.remove("active"));
                document.getElementById("page-" + t).classList.add("active");
                document.querySelectorAll(".nav button").forEach((b) => b.classList.remove("active"));
                if (btn) btn.classList.add("active");
            }
        </script>
    </body>
</html>
